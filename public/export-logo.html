<!DOCTYPE html>
<html>
<head>
  <title>Export ZimLearn Logo</title>
  <style>
    body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; color: white; gap: 24px; }
    canvas { border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    button { background: #059669; color: white; border: none; padding: 14px 32px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
    button:hover { background: #047857; }
    p { color: #9ca3af; font-size: 14px; }
  </style>
</head>
<body>
  <h2 style="margin:0">ZimLearn Logo — 512×512px</h2>
  <canvas id="c" width="512" height="512"></canvas>
  <button onclick="download()">⬇ Download PNG</button>
  <p>Upload this PNG to Google Cloud OAuth consent screen → App logo</p>

  <script>
    const canvas = document.getElementById('c')
    const ctx = canvas.getContext('2d')
    const img = new Image()
    img.onload = () => ctx.drawImage(img, 0, 0, 512, 512)
    img.src = 'zimlearn-logo.svg'

    function download() {
      const a = document.createElement('a')
      a.download = 'zimlearn-logo-512.png'
      a.href = canvas.toDataURL('image/png')
      a.click()
    }
  </script>
</body>
</html>
