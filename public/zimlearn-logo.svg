<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b"/>
      <stop offset="50%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <!-- Shine overlay -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#shine)"/>

  <!-- Graduation cap board (mortarboard top) -->
  <polygon points="256,118 420,192 256,266 92,192" fill="white" opacity="0.95"/>

  <!-- Cap board shine line -->
  <polygon points="256,118 420,192 256,266 92,192" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

  <!-- Cap body / cylinder bottom -->
  <ellipse cx="256" cy="266" rx="164" ry="30" fill="rgba(255,255,255,0.15)"/>

  <!-- Left pillar of gown (scrolling down from cap) -->
  <path d="M150,208 L150,310 Q150,345 175,360 L225,380 L225,340 L185,325 L185,220 Z" fill="white" opacity="0.9"/>

  <!-- Right pillar of gown -->
  <path d="M362,208 L362,310 Q362,345 337,360 L287,380 L287,340 L327,325 L327,220 Z" fill="white" opacity="0.9"/>

  <!-- Diploma scroll (bottom center) -->
  <rect x="210" y="352" width="92" height="52" rx="8" fill="white" opacity="0.9"/>
  <line x1="225" y1="368" x2="287" y2="368" stroke="#059669" stroke-width="4" stroke-linecap="round"/>
  <line x1="225" y1="382" x2="287" y2="382" stroke="#059669" stroke-width="4" stroke-linecap="round"/>
  <line x1="225" y1="396" x2="265" y2="396" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>

  <!-- Tassel string -->
  <line x1="420" y1="192" x2="420" y2="265" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <circle cx="420" cy="275" r="10" fill="white" opacity="0.9"/>
  <!-- Tassel threads -->
  <line x1="412" y1="275" x2="405" y2="308" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <line x1="420" y1="285" x2="420" y2="318" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <line x1="428" y1="275" x2="435" y2="308" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.85"/>

  <!-- AI sparkle dots (top left area) -->
  <circle cx="116" cy="140" r="6" fill="#6ee7b7" opacity="0.8"/>
  <circle cx="138" cy="122" r="4" fill="#a7f3d0" opacity="0.6"/>
  <circle cx="108" cy="162" r="3" fill="#6ee7b7" opacity="0.5"/>

  <!-- AI sparkle dots (top right) -->
  <circle cx="396" cy="140" r="6" fill="#6ee7b7" opacity="0.8"/>
  <circle cx="374" cy="122" r="4" fill="#a7f3d0" opacity="0.6"/>
  <circle cx="404" cy="162" r="3" fill="#6ee7b7" opacity="0.5"/>

  <!-- ZimLearn "Z" letter mark (subtle, bottom right) -->
  <text x="430" y="470" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="white" opacity="0.25" text-anchor="middle">Z</text>
</svg>
